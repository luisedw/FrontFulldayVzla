<div class="row g-4">
  @for (item of misTours; track item.id) {
    <div class="col-md-4">
      <!-- Pasamos el objeto adaptado a la tarjeta minimalista -->
      <app-tour-card [tourData]="item"></app-tour-card>
    </div>
  } @empty {
    <div class="col-12 text-center py-5">
      <i class="bi bi-cloud-slash display-4 text-muted"></i>
      <p class="text-muted mt-2">No se encontraron paquetes turísticos disponibles en este momento.</p>
    </div>
  }

  <!-- BOTÓN DE LLAMADO A LA ACCIÓN (Lleva a tu nuevo catálogo extendido) -->
  <div class="row mt-5 mb-4">
    <div class="col-12 text-center">
      <a routerLink="/destinos" 
         class="btn btn-outline-info rounded-pill px-5 py-2 fw-bold shadow-sm custom-btn-all">
        Ver todos los destinos 
        <i class="bi bi-arrow-right ms-2 fs-5"></i>
      </a>
    </div>
  </div>
</div>
